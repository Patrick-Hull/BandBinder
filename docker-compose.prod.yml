services:
  app:
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ./src:/var/www/html:ro
      - ./storage:/var/www/html/storage
    restart: unless-stopped
  db:
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    restart: unless-stopped